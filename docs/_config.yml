theme: minima

title: ServiceNow Jobs Digest UK
description: Daily curated ServiceNow jobs in the UK with visa sponsorship filtering
baseurl: ""  # Set to repo name if deploying to GitHub Pages e.g. /servicenow-jobs-digest

# Geist font via Google Fonts (hosted on fonts.geist.xyz alternative)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Custom CSS
sass:
  style: compressed

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceNow Jobs UK — Archive</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #0a0a0a; background: #ffffff; line-height: 1.6; font-size: 15px;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 60px 24px 100px; }
  .back { color: rgba(0,0,0,0.4); text-decoration: none; font-size: 0.85rem; }
  .back:hover { color: #0a0a0a; }
  h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; margin: 12px 0 4px; }
  .subtitle { color: rgba(0,0,0,0.4); font-size: 0.85rem; margin-bottom: 40px; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 8px 0;
    border-bottom: 2px solid rgba(0,0,0,0.08);
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: rgba(0,0,0,0.3);
  }
  td { padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: top; }
  td a { color: #0a0a0a; text-decoration: none; font-weight: 500; }
  td a:hover { text-decoration: underline; }
  td:last-child { text-align: right; white-space: nowrap; }
  .muted { font-size: 0.85rem; color: rgba(0,0,0,0.35); }
  .marker { font-size: 0.72rem; color: rgba(0,0,0,0.35); }
  .note {
    margin-top: 40px; padding: 16px; background: rgba(0,0,0,0.015);
    border-left: 2px solid rgba(0,0,0,0.06); font-size: 0.82rem;
    color: rgba(0,0,0,0.4); line-height: 1.6;
  }
  footer {
    margin-top: 60px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.06);
    font-size: 0.78rem; color: rgba(0,0,0,0.3);
  }
  footer a { color: #0a0a0a; }
  @media (max-width: 500px) { .container { padding: 30px 16px; } }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back">← Back</a>
  <h1>Master Archive</h1>
  <p class="subtitle">All ServiceNow UK jobs ever found.</p>
  <table>
    <thead><tr><th>Date</th><th>Job</th><th>Company</th><th>Salary</th><th></th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div class="note">
    Data from Reed, Hunt UK, and LinkedIn. Sponsor verification via <a href="https://www.gov.uk/government/publications/register-of-licensed-sponsors-workers">UK Government register</a>. Links may expire — dashboard refreshes daily.
  </div>
  <footer><p>Built by <a href="https://github.com/IbdotBoss/servicenow-jobs-digest">Mr Faajii</a></p></footer>
</div>
<script>
fetch('data/jobs.json').then(r => r.json()).then(data => {
  document.getElementById('tb').innerHTML = data.jobs
    .sort((a,b) => b.date_posted.localeCompare(a.date_posted))
    .map(j => {
      const m = [];
      if (j.visa_sponsorship === 'verified') m.push(j.sc_clearance ? 'Sponsor · SC required' : 'Sponsor verified');
      if (j.grad_scheme) m.push('Grad');
      return `<tr>
        <td class="muted">${j.date_posted}</td>
        <td>${j.url ? `<a href="${j.url}" target="_blank">${j.title}</a>` : j.title}</td>
        <td class="muted">${j.company} · ${j.location}</td>
        <td>${j.salary_display}</td>
        <td class="marker">${m.join(' · ')}</td>
      </tr>`;
    }).join('');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow Jobs UK</title>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%230a0a0a' d='M12 2L2 7l10 5 10-5-10-5z'/%3E%3C/svg%3E">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>ServiceNow Jobs UK</h1>
            <p class="subtitle">Verified visa sponsorship jobs, updated daily.</p>
            
            <!-- Stats -->
            <div class="stats">
                <span id="total-jobs">0</span> jobs from 
                <span id="sources-count">0</span> sources
            </div>
        </header>

        <!-- Filters -->
        <div class="filters">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search jobs (title, company, location)...">
                <button id="search-btn" class="btn-primary">Search</button>
                <button id="clear-search" class="btn-secondary">Clear</button>
            </div>
            
            <div class="filter-group">
                <label for="location-filter">Location:</label>
                <select id="location-filter">
                    <option value="all">All Locations</option>
                    <!-- Populated by JS -->
                </select>
            </div>
            
            <div class="filter-group">
                <label for="company-filter">Company:</label>
                <select id="company-filter">
                    <option value="all">All Companies</option>
                    <!-- Populated by JS -->
                </select>
            </div>
            
            <div class="filter-group">
                <label for="source-filter">Source:</label>
                <select id="source-filter">
                    <option value="all">All Sources</option>
                    <!-- Populated by JS -->
                </select>
            </div>
            
            <div class="filter-group">
                <label>Sponsorship:</label>
                <label class="checkbox-label">
                    <input type="checkbox" id="sponsorship-filter" checked> 
                    Only sponsored
                </label>
            </div>
            
            <div class="filter-group">
                <label>Remote:</label>
                <label class="checkbox-label">
                    <input type="checkbox" id="remote-filter"> 
                    Remote only
                </label>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="sort-group">
                <label for="sort-by">Sort by:</label>
                <select id="sort-by">
                    <option value="date-desc">Newest First</option>
                    <option value="date-asc">Oldest First</option>
                    <option value="company">Company Name</option>
                    <option value="location">Location</option>
                    <option value="source">Source</option>
                </select>
            </div>
            
            <div class="view-group">
                <button id="grid-view" class="view-btn active">Grid</button>
                <button id="list-view" class="view-btn">List</button>
            </div>
            
            <div class="group-by">
                <label for="group-by">Group by:</label>
                <select id="group-by">
                    <option value="none">None</option>
                    <option value="company">Company</option>
                    <option value="location">Location</option>
                    <option value="source">Source</option>
                    <option value="tags">Tags</option>
                </select>
            </div>
        </div>

        <!-- Jobs Container -->
        <main id="jobs-container" class="jobs-container">
            <!-- Jobs will be loaded here dynamically -->
            <div class="loading">Loading jobs...</div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Last updated: <span id="last-updated"></span> · <span id="job-count"></span> jobs</p>
            <p><a href="https://github.com/IbdotBoss/servicenow-jobs-digest">View on GitHub</a></p>
        </footer>
    </div>

    <script src="jobs.js"></script>
</body>
</html>
